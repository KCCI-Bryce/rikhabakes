<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rikhabakes - Client Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,700;1,9..144,400&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css">
  <style>
    body { background-color: var(--surface); margin: 0; padding: 0; font-family: 'Manrope', sans-serif; color: var(--text); }
    .dashboard-layout { display: flex; min-height: 100vh; }
    .sidebar { width: 250px; background: #000; border-right: 1px solid rgba(255,255,255,0.1); padding: 2rem; display: flex; flex-direction: column; }
    .sidebar .brand { font-size: 1.2rem; margin-bottom: 3rem; }
    .sidebar nav { display: flex; flex-direction: column; gap: 1.5rem; }
    .sidebar nav a { color: var(--muted); text-decoration: none; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.1em; transition: color 0.3s; }
    .sidebar nav a:hover, .sidebar nav a.active { color: var(--text); }
    .sidebar .logout { margin-top: auto; color: #ff5555; cursor: pointer; background: none; border: none; font-family: 'Manrope'; text-transform: uppercase; letter-spacing: 0.1em; text-align: left; transition: color 0.3s;}
    .sidebar .logout:hover { color: #ff8888; }
    .main-content { flex: 1; padding: 3rem 4rem; overflow-y: auto; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 2rem;}
    .header h1 { font-family: 'Fraunces', serif; font-size: 2.5rem; margin: 0; }
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; margin-bottom: 3rem; }
    .stat-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); padding: 2rem; border-radius: 8px; transition: transform 0.3s, background 0.3s; }
    .stat-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.05); }
    .stat-card h3 { font-size: 0.85rem; text-transform: uppercase; color: var(--muted); letter-spacing: 0.1em; margin-bottom: 1rem; }
    .stat-card .value { font-size: 3rem; font-family: 'Fraunces', serif; color: var(--text); }
    .charts-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; }
    .chart-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); padding: 2.5rem; border-radius: 8px; }
    canvas { width: 100% !important; height: auto !important; max-height: 400px; }
    
    /* Override invisible global cursor for Admin */
    * { cursor: auto; }
    a, button { cursor: pointer; }
  </style>
</head>
<body>
  <div class="dashboard-layout">
    <aside class="sidebar">
      <a href="index.html" class="brand">Rikhabakes</a>
      <nav>
        <a href="#" class="active">Overview</a>
        <a href="#">Audiences</a>
        <a href="#">Products</a>
        <a href="#">Settings</a>
      </nav>
      <button class="logout" id="logout-btn">Sign Out</button>
    </aside>
    <main class="main-content">
      <div class="header">
        <h1>Dashboard Analytics</h1>
        <div style="font-size: 0.9rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em;">Client Access Verified</div>
      </div>
      
      <div class="stats-grid">
        <div class="stat-card">
          <h3>Total Subscribers</h3>
          <div class="value" id="total-subscribers">-</div>
        </div>
        <div class="stat-card">
          <h3>Monthly Revenue</h3>
          <div class="value">$14,250</div>
        </div>
        <div class="stat-card">
          <h3>Active Reserve</h3>
          <div class="value">42</div>
        </div>
      </div>
      
      <div class="charts-grid">
        <div class="chart-card">
          <h3 style="font-size: 0.9rem; text-transform: uppercase; color: var(--muted); letter-spacing: 0.1em; margin-bottom: 2rem;">Customer Growth</h3>
          <canvas id="growthChart"></canvas>
        </div>
        <div class="chart-card">
          <h3 style="font-size: 0.9rem; text-transform: uppercase; color: var(--muted); letter-spacing: 0.1em; margin-bottom: 2rem;">Sales by Category</h3>
          <canvas id="salesChart"></canvas>
        </div>
      </div>
    </main>
  </div>
  <script type="module" src="/src/dashboard.ts"></script>
</body>
</html>
